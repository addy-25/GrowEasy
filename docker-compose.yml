services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    # API credentials live in backend/.env, never in the image
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        # the BROWSER calls the backend, so this must be a host-reachable URL
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
